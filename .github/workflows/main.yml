name: Build and Auto Release

on:
  push:
    tags:
      - '[0-9]*' # 匹配所有纯数字版本号标签

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 1. 编译并打包出 cipx 文件
    - name: Publish and Create CIPX
      run: dotnet publish -c Release -p:CreateCipx=true

    # 2. 修正路径：使用 PowerShell 去 SDK 生成的 cipx 目录下计算 MD5
    - name: Calculate MD5
      id: calc_md5
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path "**/cipx/*.cipx" | Select-Object -First 1
        if ($file) {
            $md5 = (Get-FileHash $file.FullName -Algorithm MD5).Hash.ToLower()
            "FILE_MD5=$md5" | Out-File -FilePath $env:GITHUB_ENV -Append
            "FILE_NAME=$($file.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "FILE_PATH=$($file.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
            Write-Error "未找到打包生成的 .cipx 文件"
            exit 1
        }

    # 3. 创建 Release，同时上传产物，并在内容里带上 MD5 和自动生成的更新日志
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true  # 自动生成更新日志并拼在后面
        append_body: true             # 确保 MD5 和日志同时存在
        body: |
          ### 📦 产物校验信息
          - **文件名**: ${{ env.FILE_NAME }}
          - **MD5**: `${{ env.FILE_MD5 }}`
          
          ---
          ### 📝 更新日志
        files: |
          ${{ env.FILE_PATH }}