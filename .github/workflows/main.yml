name: Build and Auto Release

# 触发条件：只有在本地打标签并推送到 GitHub 时才会触发（例如：v1.0.0）
on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 1. 编译并打包出 cipx 文件
    - name: Publish and Create CIPX
      run: dotnet publish -c Release -p:CreateCipx=true

    # 2. 使用 PowerShell 计算 CIPX 文件的 MD5 校验和
    - name: Calculate MD5
      id: calc_md5
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path "**/bin/Release/net8.0-windows/publish/*.cipx", "**/bin/Release/net8.0-windows/*.cipx" | Select-Object -First 1
        if ($file) {
            $md5 = (Get-FileHash $file.FullName -Algorithm MD5).Hash.ToLower()
            "FILE_MD5=$md5" | Out-File -FilePath $env:GITHUB_ENV -Append
            "FILE_NAME=$($file.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
            Write-Error "未找到打包生成的 .cipx 文件"
            exit 1
        }

    # 3. 创建 GitHub Release 并上传产物
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true  # 自动生成更新日志
        append_body: true             # 将 MD5 附加在更新日志前面
        body: |
          ### 📦 产物校验信息
          - **文件名**: ${{ env.FILE_NAME }}
          - **MD5**: `${{ env.FILE_MD5 }}`
          
          ---
          ### 📝 更新日志
        files: |
          **/bin/Release/net8.0-windows/publish/*.cipx
          **/bin/Release/net8.0-windows/*.cipx
