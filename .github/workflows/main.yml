name: Build and Auto Release

on:
  push:
    tags:
      - '[0-9]*' # 匹配所有纯数字版本号标签

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 必须拉取历史才能获取 commit 内容

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 1. 编译并打包出 cipx 文件
    - name: Publish and Create CIPX
      run: dotnet publish -c Release -p:CreateCipx=true

    # 2. 使用 PowerShell 计算 CIPX 文件的 MD5 校验和
    - name: Calculate MD5
      id: calc_md5
      shell: pwsh
      run: |
        $file = Get-ChildItem -Path "**/cipx/*.cipx" | Select-Object -First 1
        if ($file) {
            $md5 = (Get-FileHash $file.FullName -Algorithm MD5).Hash.ToLower()
            "FILE_MD5=$md5" | Out-File -FilePath $env:GITHUB_ENV -Append
            "FILE_NAME=$($file.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "FILE_PATH=$($file.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
            Write-Error "未找到打包生成的 .cipx 文件"
            exit 1
        }

    # 3. 提取最后一次 commit -m 的内容
    - name: Get Commit Message
      id: commit_msg
      shell: pwsh
      run: |
        # 获取当前标签所在 commit 的提交信息
        $msg = git log -1 --pretty=format:"%s"
        "COMMIT_MSG=$msg" | Out-File -FilePath $env:GITHUB_ENV -Append

    # 4. 创建 Release 并上传产物（关闭了 GitHub 自身的日志，只用你的 commit 信息）
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: false # 关闭 GitHub 自带的汇总，避免重复
        body: |
          ### 📦 产物校验信息
          - **文件名**: ${{ env.FILE_NAME }}
          - **MD5**: `${{ env.FILE_MD5 }}`
          
          ---
          ### 📝 更新日志
          - ${{ env.COMMIT_MSG }}
        files: |
          ${{ env.FILE_PATH }}
