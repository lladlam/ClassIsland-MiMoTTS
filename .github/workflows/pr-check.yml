name: PR Build Check

# 触发条件：当有人对 main 分支发起 PR，或者更新 PR 时
on:
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 核心：尝试编译项目。如果别人的代码有语法错误或缺少文件，这一步会直接报错失败。
    - name: Build Project
      run: dotnet build -c Release
