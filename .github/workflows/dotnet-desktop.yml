name: .NET Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore MiMoTTS.sln

    - name: Build
      run: dotnet build MiMoTTS.sln --configuration ${{ matrix.configuration }} --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MiMoTTS-${{ matrix.configuration }}
        path: MiMoTTS/bin/${{ matrix.configuration }}/
